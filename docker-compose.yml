version: "3.9"

services:

  backend:
    build: .
    container_name: recommender-backend

    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    image: python:3.12-slim

    container_name: recommender-frontend

    working_dir: /app

    volumes:
      - .:/app

    command: >
      sh -c "pip install -r requirements.txt &&
             streamlit run src/frontend.py
             --server.address 0.0.0.0
             --server.port 8501"

    ports:
      - "8501:8501"

    depends_on:
      - backend

    restart: unless-stopped